<script type="module">

  import * as pdflib from 'https://cdn.jsdelivr.net/npm/@cantoo/pdf-lib@2.6.5/+esm'

  import { countPdfPages, mergeTwoPdfs, mergePdfsByTOC, addPageNumberingToPdf, validateCoverPage,
           addPageNumberingViaWorker, footerWorkerPeaks }
    from './js/buntoolPages.js'
  import { addHyperlinks, addOutlineItems, setMetadata,
           runMetaViaWorker, metaWorkerPeaks }
    from './js/buntoolMeta.js'
  import { createTocEntries, makeTocPages, makeDummyTocPages }
    from './js/buntoolToc.js'

    from './js/buntoolMerge.js'

  // ── WASM init ────────────────────────────────────────────────────────────────

  const SAVE_OPTS_VARIANTS = [

    { opts: 'pdf,garbage',                      label: 'garbage',         note: 'basic GC: removes unreferenced objects' },
    { opts: 'pdf,garbage=compact',              label: 'compact',         note: 'GC + compact xref table' },
    { opts: 'pdf,garbage=deduplicate',          label: 'deduplicate',     note: 'GC + deduplicate shared objects (fonts, images)' },
    { opts: 'pdf,compress',                     label: 'compress',        note: 'compress all streams' },
    { opts: 'pdf,compress-fonts',               label: 'cmp-fonts',       note: 'compress embedded font data only' },
    { opts: 'pdf,compress-images',              label: 'cmp-images',      note: 'compress image streams only' },
    { opts: 'pdf,garbage=deduplicate,compress', label: 'dedup+compress',  note: 'deduplicate + compress — recommended for OOM' },
    { opts: 'pdf,objstms',                      label: 'objstms',         note: 'PDF 1.5 object streams' },
    { opts: 'pdf,incremental',                  label: 'incremental',     note: 'incremental update — appends; not a full rewrite' },
  ];

    { id: 'per-doc',   label: 'per-doc map',          note: 'dst.newGraftMap() once per source doc — deduplicates within-doc resources' },
  ];

  document.getElementById('memLight').disabled   = false;
  document.getElementById('memHeavy').disabled   = false;
  document.getElementById('memMassive').disabled = false;

  initGraftButtons();


  // ── Mock Config ──────────────────────────────────────────────────────────────
  function makeConfig(overrides = {}) {
    const defaults = {
      'pageOptions.printableBundle':    false,
      'pageOptions.coversheet':         false,
      'pageNumbering.footerPrefix':     '',
      'pageNumbering.alignment':        'centre',
      'pageNumbering.numberingStyle':   'PageX',
      'pageNumbering.footerFont':       'sansSerif',
      'pageNumbering.pageNumberColour': 'black',
      'heading.bundleTitle':            'Test Bundle',
      'heading.projectName':            'Test Project',
      'heading.claimNumber':            'CL-2024-001',
      'heading.confidential':           false,
      'heading.fontSize':               'medium',
      'index.fontFace':                 'sansSerif',
      'index.dateStyle':                'DD Mon. YYYY',
      'index.outlineItemStyle':         'plain',
      'index.fontSize':                 'medium',
      'index.showTableBorders':         false,
      'index.justTheIndex':             false,
    };
    return {
      getOption:         (key) => key in overrides ? overrides[key] : defaults[key],
      updateOptions:     () => {},
      validateStructure: () => {},
      validateOptions:   () => {},
    };
  }


  // ── Synthetic PDF generator ──────────────────────────────────────────────────
  async function makePdf(pageCount, label = '') {
    const doc  = await pdflib.PDFDocument.create();
    const font = await doc.embedFont(pdflib.StandardFonts.Helvetica);
    for (let i = 0; i < pageCount; i++) {
      const page = doc.addPage([595.28, 841.89]);
      page.drawText(`${label} p${i + 1}/${pageCount}`, { x: 50, y: 400, size: 12, font });
    }
    return new Uint8Array(await doc.save());
  }

  // File-like wrapper for countPdfPages (expects .arrayBuffer())
  function fileOf(bytes) {
    return { arrayBuffer: () => Promise.resolve(bytes.buffer) };
  }

  // Map of filename → File-like object
  function filesMapOf(entries) {
    return new Map(entries.map(([name, bytes]) => [name, fileOf(bytes)]));
  }


  // ── Inspection helpers ───────────────────────────────────────────────────────
  function openDoc(bytes) {
    return mupdf.Document.openDocument(new Uint8Array(bytes), "application/pdf");
  }

  function getPageCount(bytes) {
    return openDoc(bytes).countPages();
  }

  function getPageText(bytes, pageIndex) {
    try {
      const page = openDoc(bytes).loadPage(pageIndex);
      return page.toStructuredText("preserve-whitespace").asText();
    } catch { return ''; }
  }

  function getLinks(bytes, pageIndex = 0) {
    try {
      const page = openDoc(bytes).loadPage(pageIndex);
      return page.getLinks() ?? [];
    } catch { return []; }
  }

  function getOutline(bytes) {
    const doc   = openDoc(bytes);
    const items = [];

    // DFS walk: each insert() appears to nest as .down of the previous item
    // rather than as a .next sibling, so we must follow both axes.
    function* walk(node) {
      while (node) {
        yield node;
        try { yield* walk(node.down ?? null); } catch {}
        node = node.next ?? null;
      }
    }

    try {
      const root  = doc.loadOutline();
      const start = root?.down ?? root; // root itself has no title; real items are children
      for (const node of walk(start)) {
        const title = typeof node.title === 'string' ? node.title : '';
        if (title) items.push({ title, page: node.page ?? null });
      }
      if (items.length) return items;
    } catch {}

    // Fallback: outlineIterator (next() returns 1 on success, -1 on end)
    try {
      const iter = doc.outlineIterator();
      let item = iter.item();
      let safety = 0;
      while (item && safety++ < 100) {
        items.push({ title: item.title ?? '', uri: item.uri ?? '' });
        const moved = iter.next();
        item = (moved === 1 || moved === true) ? iter.item() : null;
      }
    } catch {}
    return items;
  }

  // Returns the concatenated decompressed content stream for a page.
  // Mirrors the stream-access pattern used in buntoolRestore.removePageNumbering.
  function getContentStream(bytes, pageIndex) {
    try {
      const doc        = mupdf.Document.openDocument(new Uint8Array(bytes), 'application/pdf');
      const pageDict   = doc.findPage(pageIndex);
      const contentsRef = pageDict.get('Contents');
      if (!contentsRef || contentsRef.isNull()) return '';
      const streamRefs = contentsRef.isArray()
        ? Array.from({ length: contentsRef.length }, (_, j) => contentsRef.get(j))
        : [contentsRef];
      return streamRefs
        .filter(ref => ref.isStream())
        .map(ref => ref.readStream().asString())
        .join('');
    } catch { return ''; }
  }

  function getMeta(bytes) {
    const doc = openDoc(bytes);
    return {
      // mupdf getMetaData uses info: prefix for PDF info-dict fields
      title:    doc.getMetaData("info:Title"),
      producer: doc.getMetaData("info:Producer"),
      subject:  doc.getMetaData("info:Subject"),
      keywords: doc.getMetaData("info:Keywords"),
      bundleIndex: (() => {
        try { return JSON.parse(doc.getMetaData("info:BundleIndex")); } catch { return null; }
      })(),
    };
  }


  // Returns the font name mupdf reports for the first line on a page whose text
  // contains searchStr. Handles both line.text (string) and line.chars[] forms.
  function getFontForText(bytes, pageIndex, searchStr) {
    try {
      const page = openDoc(bytes).loadPage(pageIndex);
      const json = JSON.parse(page.toStructuredText('preserve-whitespace').asJSON());
      for (const block of json.blocks ?? []) {
        if (block.type !== 'text') continue;
        for (const line of block.lines ?? []) {
          const text = typeof line.text === 'string'
            ? line.text
            : (line.chars ?? []).map(c => typeof c.c === 'number' ? String.fromCharCode(c.c) : (c.c ?? '')).join('');
          if (text.includes(searchStr)) return line.font?.name ?? null;
        }
      }
    } catch {}
    return null;
  }

  // Expected font name substrings per buntoolPages FONT_CONFIG key.
  // Embedded fonts get a random 6-char subset prefix (e.g. "ABCDEF+PlusJakartaSans-Regular"),
  // so we match by substring rather than exact string.
  // helvetica → Liberation sans; times → Charis SIL (CharisSILR.ttf)
  const FONT_NAME_SUBSTRINGS = {
    helvetica:   'Liberation',
    times:       'Charis',
    courier:     'Courier',
    serif:       'NotoSerif',
    sansSerif:   'Jakarta',
    monospaced:  'Ubuntu',
    traditional: 'Garamond',
  };

  // buntoolToc uses jsPDF addFont registration names, which differ slightly.
  // courier has no dedicated case in buntoolToc and falls to default (sansSerif/PlusJakartaSans).
  const FONT_NAME_SUBSTRINGS_TOC = {
    helvetica:   'Liberation',    // LiberationSans-Regular.ttf → LiberationSans
    times:       'Charis',   // CharisSILR.ttf → CharisSIL
    courier:     'Jakarta',  // no case → falls to default (sansSerif)
    serif:       'NotoSerif',
    sansSerif:   'Jakarta',
    monospaced:  'Ubuntu',
    traditional: 'Garamond',
  };


  // ── Assertion helpers ────────────────────────────────────────────────────────
  function ok(name, actual, expected, detail = '') {
    const passed = JSON.stringify(actual) === JSON.stringify(expected);
    return { name, passed, expected, actual, detail };
  }

  function truthy(name, value, detail = '') {
    return { name, passed: !!value, expected: 'truthy', actual: value, detail };
  }

  function flatten(raw) {
    return [raw].flat(2).filter(Boolean);
  }


  // ── Test groups ──────────────────────────────────────────────────────────────

  // buntoolPages ---------------------------------------------------------------

  async function test_countPdfPages() {
    const bytes = await makePdf(7, 'count');
    const count = await countPdfPages(fileOf(bytes));
    return ok('countPdfPages', count, 7);
  }

  async function test_mergeTwoPdfs() {
    const a = await makePdf(3, 'A');
    const b = await makePdf(5, 'B');
    return ok('mergeTwoPdfs: 3+5=8', getPageCount(await mergeTwoPdfs(a, b)), 8);
  }

  async function test_mergePdfsByTOC() {
    const config = makeConfig();
    const [p3, p5, p2] = await Promise.all([makePdf(3,'D1'), makePdf(5,'D2'), makePdf(2,'D3')]);
    const filesMap  = filesMapOf([['d1.pdf',p3],['d2.pdf',p5],['d3.pdf',p2]]);
    const tocEntries = [
      { tabNumber: 1, title: 'D1', filename: 'd1.pdf', sectionBreak: null },
      { tabNumber: '', title: 'Sec', filename: null, sectionBreak: 'Section 1' }, // skipped
      { tabNumber: 2, title: 'D2', filename: 'd2.pdf', sectionBreak: null },
      { tabNumber: 3, title: 'D3', filename: 'd3.pdf', sectionBreak: null },
    ];
    const merged = await mergePdfsByTOC(tocEntries, filesMap, config);
    return ok('mergePdfsByTOC: 3+5+2=10 (section header skipped)', getPageCount(merged), 10);
  }

  async function test_mergePdfsByTOC_printable() {
    const config = makeConfig({ 'pageOptions.printableBundle': true });
    const [odd, even] = await Promise.all([makePdf(3,'Odd'), makePdf(4,'Even')]);
    const filesMap   = filesMapOf([['odd.pdf',odd],['even.pdf',even]]);
    const tocEntries = [
      { tabNumber: 1, title: 'Odd',  filename: 'odd.pdf',  sectionBreak: null },
      { tabNumber: 2, title: 'Even', filename: 'even.pdf', sectionBreak: null },
    ];
    const merged = await mergePdfsByTOC(tocEntries, filesMap, config);
    // 3 (odd) +1 blank +4 (even) = 8
    return ok('mergePdfsByTOC printable: odd-page doc gets blank page (3+1+4=8)', getPageCount(merged), 8);
  }

  // mergeTwoPdfsViaWorker / mergePdfsByTOCViaWorker (mupdf worker versions) ------

  async function test_mergeTwoPdfsViaWorker() {
    const a = await makePdf(3, 'wA');
    const b = await makePdf(5, 'wB');
    return ok('mergeTwoPdfsViaWorker: 3+5=8', getPageCount(await mergeTwoPdfsViaWorker(a, b)), 8);
  }

  async function test_mergePdfsByTOCViaWorker() {
    const config = makeConfig();
    const [p3, p5, p2] = await Promise.all([makePdf(3,'wD1'), makePdf(5,'wD2'), makePdf(2,'wD3')]);
    const filesMap   = filesMapOf([['d1.pdf',p3],['d2.pdf',p5],['d3.pdf',p2]]);
    const tocEntries = [
      { tabNumber: 1, title: 'D1',  filename: 'd1.pdf', sectionBreak: null },
      { tabNumber: '', title: 'Sec', filename: null,    sectionBreak: 'Section 1' }, // skipped
      { tabNumber: 2, title: 'D2',  filename: 'd2.pdf', sectionBreak: null },
      { tabNumber: 3, title: 'D3',  filename: 'd3.pdf', sectionBreak: null },
    ];
    const merged = await mergePdfsByTOCViaWorker(tocEntries, filesMap, config);
    return ok('mergePdfsByTOCViaWorker: 3+5+2=10 (section header skipped)', getPageCount(merged), 10);
  }

  async function test_mergePdfsByTOCViaWorker_printable() {
    const config = makeConfig({ 'pageOptions.printableBundle': true });
    const [odd, even] = await Promise.all([makePdf(3,'wOdd'), makePdf(4,'wEven')]);
    const filesMap   = filesMapOf([['odd.pdf',odd],['even.pdf',even]]);
    const tocEntries = [
      { tabNumber: 1, title: 'Odd',  filename: 'odd.pdf',  sectionBreak: null },
      { tabNumber: 2, title: 'Even', filename: 'even.pdf', sectionBreak: null },
    ];
    const merged = await mergePdfsByTOCViaWorker(tocEntries, filesMap, config);
    // 3 (odd) + 1 blank + 4 (even) = 8
    return ok('mergePdfsByTOCViaWorker printable: odd-page doc gets blank page (3+1+4=8)', getPageCount(merged), 8);
  }

  async function test_addPageNumbering_count() {
    const config  = makeConfig({ 'pageNumbering.numberingStyle': 'PageX' });
    const pdf     = await makePdf(4, 'num');
    const result  = await addPageNumberingToPdf(pdf, config);
    return ok('addPageNumberingToPdf: page count unchanged', getPageCount(result), 4);
  }

  async function test_addPageNumbering_footer() {
    const config = makeConfig({ 'pageNumbering.numberingStyle': 'PageX' });
    const pdf    = await makePdf(3, 'footer');
    const result = await addPageNumberingToPdf(pdf, config);
    const t1 = getPageText(result, 0);
    const t3 = getPageText(result, 2);
    return [
      truthy('addPageNumberingToPdf: page 1 footer "Page 1"', t1.includes('Page 1'), t1.slice(0,120)),
      truthy('addPageNumberingToPdf: page 3 footer "Page 3"', t3.includes('Page 3'), t3.slice(0,120)),
    ];
  }

  async function test_addPageNumbering_XofY() {
    const config = makeConfig({ 'pageNumbering.numberingStyle': 'XofY' });
    const pdf    = await makePdf(4, 'xofy');
    const result = await addPageNumberingToPdf(pdf, config);
    const t2     = getPageText(result, 1); // page 2
    return truthy('addPageNumberingToPdf XofY: page 2 has "2 of 4"', t2.includes('2 of 4'), t2.slice(0,120));
  }

  async function test_addPageNumbering_eachFont() {
    const results = [];
    for (const fontName of validFonts) {
      const config = makeConfig({
        'pageNumbering.numberingStyle': 'PageX',
        'pageNumbering.footerFont': fontName,
      });
      const pdf = await makePdf(2, fontName);
      try {
        const result = await addPageNumberingToPdf(pdf, config);
        const t1 = getPageText(result, 0);
        results.push(
          ok    (`addPageNumberingToPdf [${fontName}]: page count unchanged`, getPageCount(result), 2),
          truthy(`addPageNumberingToPdf [${fontName}]: footer "Page 1" present`, t1.includes('Page 1'), t1.slice(0, 100)),
        );
      } catch (err) {
        results.push({ name: `addPageNumberingToPdf [${fontName}]`, passed: false, expected: 'no error', actual: String(err) });
      }
    }
    return results;
  }

  async function test_addPageNumbering_correctFont() {
    const results = [];
    for (const fontName of validFonts) {
      const config = makeConfig({
        'pageNumbering.numberingStyle': 'PageX',
        'pageNumbering.footerFont': fontName,
      });
      const pdf      = await makePdf(2, fontName);
      const result   = await addPageNumberingToPdf(pdf, config);
      const reported = getFontForText(result, 0, 'Page');
      const expected = FONT_NAME_SUBSTRINGS[fontName];
      results.push(truthy(
        `addPageNumberingToPdf [${fontName}]: footer uses correct font`,
        reported?.includes(expected),
        `reported: "${reported}", expected to include: "${expected}"`,
      ));
    }
    return results;
  }

  async function test_addPageNumbering_colourStrip_allFonts() {
    // For every font: add page numbers, then removePageNumbering should strip them.
    // This guards that the buntool signature colour is embedded regardless of font choice.
    const results = [];
    for (const fontName of validFonts) {
      const config = makeConfig({
        'pageNumbering.numberingStyle': 'PageX',
        'pageNumbering.footerFont': fontName,
      });
      const pdf      = await makePdf(2, fontName);
      const numbered = await addPageNumberingToPdf(pdf, config);
      const stripped = await removePageNumbering(numbered);
      const before   = getPageText(numbered, 0);
      const after    = getPageText(stripped,  0);
      results.push(
        truthy(`colour-strip [${fontName}]: "Page 1" present before strip`, before.includes('Page 1'), before.slice(0, 80)),
        truthy(`colour-strip [${fontName}]: "Page 1" absent after strip`,  !after.includes('Page 1'),  after.slice(0, 80)),
      );
    }
    return results;
  }

  async function test_addPageNumbering_eachColour() {
    const results = [];
    for (const colour of validPageNumberColours) {
      const config = makeConfig({
        'pageNumbering.numberingStyle':   'PageX',
        'pageNumbering.pageNumberColour': colour,
      });
      const pdf = await makePdf(2, colour);
      try {
        const result = await addPageNumberingToPdf(pdf, config);
        const t1 = getPageText(result, 0);
        results.push(
          ok    (`addPageNumberingToPdf [${colour}]: page count unchanged`, getPageCount(result), 2),
          truthy(`addPageNumberingToPdf [${colour}]: footer "Page 1" present`, t1.includes('Page 1'), t1.slice(0, 100)),
        );
      } catch (err) {
        results.push({ name: `addPageNumberingToPdf [${colour}]`, passed: false, expected: 'no error', actual: String(err) });
      }
    }
    return results;
  }

  // Expected colour strings as they appear in the PDF content stream
  const COLOUR_STREAM_STRINGS = {
    black: '0.072 0.021 0.073 rg',
    red:   '0.872 0.032 0.101 rg',
    blue:  '0.083 0.221 0.873 rg',
  };

  async function test_addPageNumbering_correctColourInStream() {
    // Verifies the correct colour fingerprint appears in the decompressed content stream.
    const results = [];
    for (const colour of validPageNumberColours) {
      const config = makeConfig({
        'pageNumbering.numberingStyle':   'PageX',
        'pageNumbering.pageNumberColour': colour,
      });
      const pdf      = await makePdf(2, colour);
      const result   = await addPageNumberingToPdf(pdf, config);
      const stream   = getContentStream(result, 0);
      const expected = COLOUR_STREAM_STRINGS[colour];
      results.push(truthy(
        `addPageNumberingToPdf [${colour}]: correct colour in stream`,
        stream.includes(expected),
        `expected: "${expected}", stream excerpt: "${stream.slice(0, 120)}"`,
      ));
    }
    return results;
  }

  // addPageNumberingViaWorker ----------------------------------------------------

  async function test_addPageNumberingViaWorker_count() {
    const config = makeConfig({ 'pageNumbering.numberingStyle': 'PageX' });
    const pdf    = await makePdf(4, 'workerNum');
    const result = await addPageNumberingViaWorker(pdf, config);
    return ok('addPageNumberingViaWorker: page count unchanged', getPageCount(result), 4);
  }

  async function test_addPageNumberingViaWorker_footer() {
    const config = makeConfig({ 'pageNumbering.numberingStyle': 'PageX' });
    const pdf    = await makePdf(3, 'workerFooter');

  // Valid sfnt container magic bytes (first 4 bytes of a font file).
  // Covers TrueType (0x00010000), some Apple fonts ('true'), and OpenType CFF ('OTTO').
  const FONT_MAGIC_SIGNATURES = [
    [0x00, 0x01, 0x00, 0x00],
    [0x74, 0x72, 0x75, 0x65], // 'true'
    [0x4F, 0x54, 0x54, 0x4F], // 'OTTO'
  ];

  function isValidFontMagic(bytes) {
    return FONT_MAGIC_SIGNATURES.some(sig => sig.every((b, i) => bytes[i] === b));
  }

  async function checkFontAsset(label, url) {
    try {
      const res = await fetch(url);
      if (!res.ok) {
        return [
          { name: `${label}: HTTP 200`, passed: false, expected: 200, actual: res.status, detail: url },
        ];
      }
      const bytes = new Uint8Array(await res.arrayBuffer());
      const magic = [...bytes.slice(0, 4)].map(b => '0x' + b.toString(16).padStart(2, '0')).join(' ');
      return [
        truthy(`${label}: accessible (HTTP 200)`, true),
        truthy(`${label}: valid font magic`, isValidFontMagic(bytes), `first 4 bytes: ${magic}`),
      ];
    } catch (err) {
      return [{ name: `${label}: accessible`, passed: false, expected: 'no error', actual: String(err), detail: url }];
    }
  }

  let lastResults = [];

  function formatResultsAsText(results) {
    return results.map(r =>
      `${r.passed ? 'PASS' : 'FAIL'}  ${r.name}` +
      (r.passed ? '' : `\n      expected: ${JSON.stringify(r.expected)}\n      actual:   ${JSON.stringify(r.actual)}${r.detail ? `\n      detail:   ${r.detail}` : ''}`)
    ).join('\n');
  }

  async function runAll() {
    const statusEl  = document.getElementById('status');
    const resultsEl = document.getElementById('results');
    const summaryEl = document.getElementById('summary');
    document.getElementById('runAll').disabled = true;
    document.getElementById('copyAll').disabled = true;
    document.getElementById('copyFailures').disabled = true;
    resultsEl.innerHTML = '';
    summaryEl.innerHTML = '';

    const allResults = [];
    let tableHtml = `<table><thead><tr>
      <th style="width:2em"></th>
      <th>Assertion</th>
      <th>Expected</th>
      <th>Actual</th>
      <th>Detail</th>
    </tr></thead><tbody>`;

    for (const group of GROUPS) {
      tableHtml += `<tr class="group-header"><td colspan="5">${group.label}</td></tr>`;
      for (const test of group.tests) {
        statusEl.textContent = `Running: ${test.name.replace(/^test_/, '')}…`;
        let results;
        try {
          results = flatten(await test());
        } catch (err) {
          results = [{ name: test.name, passed: false, expected: '—', actual: `ERROR`, detail: err.message + '\n' + (err.stack || '') }];
        }
        for (const r of results) {
          allResults.push(r);
          tableHtml += `<tr${r.passed ? '' : ' class="fail-row"'}>
            <td class="${r.passed ? 'pass' : 'fail'}">${r.passed ? '✓' : '✗'}</td>
            <td>${r.name}</td>
            <td>${JSON.stringify(r.expected)}</td>
            <td>${JSON.stringify(r.actual)}</td>
            <td class="detail">${r.detail || ''}</td>
          </tr>`;
        }
      }
    }

    tableHtml += '</tbody></table>';
    statusEl.textContent = 'Done.';
    document.getElementById('runAll').disabled = false;

    const passed = allResults.filter(r => r.passed).length;
    const total  = allResults.length;
    summaryEl.innerHTML = `<p class="${passed === total ? 'summary-pass' : 'summary-fail'}">${passed} / ${total} assertions passed.</p>`;
    resultsEl.innerHTML = tableHtml;

    lastResults = allResults;
    document.getElementById('copyAll').disabled = false;
    document.getElementById('copyFailures').disabled = allResults.every(r => r.passed);
  }

  function makeCopyHandler(filterFn, btnId) {
    document.getElementById(btnId).addEventListener('click', async () => {
      const btn  = document.getElementById(btnId);
      const text = formatResultsAsText(lastResults.filter(filterFn));
      try {
        await navigator.clipboard.writeText(text);
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = orig; }, 1500);
      } catch {
        prompt('Copy this:', text);
      }
    });
  }

  document.getElementById('runAll').addEventListener('click', runAll);
  makeCopyHandler(() => true,       'copyAll');
  makeCopyHandler(r => !r.passed,   'copyFailures');

  let lastMemLog = null;

  async function runMemtest(label, pdfList) {
    const memEl = document.getElementById('memResults');
    for (const id of ['memLight', 'memHeavy', 'memMassive', 'downloadMem'])
      document.getElementById(id).disabled = true;
    lastMemLog = null;
    memEl.innerHTML = `<h2>${label}</h2><p><em>Loading files…</em></p>`;

    const runTimestamp = new Date().toISOString();
    const log = [];
    const t0  = performance.now();

    // Continuous polling to capture intra-stage heap peaks (onProgress only fires pre-stage)
    let pollInterval  = null;
    let pollPeak      = null; // { used, stage }
    let currentStage  = 'start';

    function startPolling() {
      pollInterval = setInterval(() => {
        const mem = performance.memory;
        if (!mem) return;
        if (pollPeak === null || mem.usedJSHeapSize > pollPeak.used)
          pollPeak = { used: mem.usedJSHeapSize, stage: currentStage };
      }, 200);
    }

    function stopPolling() {
      if (pollInterval !== null) { clearInterval(pollInterval); pollInterval = null; }
    }

    function snapshot(stage) {
      const mem = performance.memory;
      log.push({
        stage,
        elapsed: ((performance.now() - t0) / 1000).toFixed(2),
        used:    mem ? mem.usedJSHeapSize  : null,
        total:   mem ? mem.totalJSHeapSize : null,
      });
      performance.mark(`buntool-memtest:${stage}`);
    }

    snapshot('start');
    startPolling();

    const filesMap  = new Map();
    const indexData = [];

    for (const entry of pdfList) {
      const { filename, title, date, subdir = '' } = entry;
      try {
        const url   = `/testpdfs/${subdir ? subdir + '/' : ''}${encodeURIComponent(filename)}`;
        const res   = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const bytes = new Uint8Array(await res.arrayBuffer());
        const file  = { arrayBuffer: () => Promise.resolve(bytes.buffer), name: filename };
        filesMap.set(filename, file);
        const pageCount = await countPdfPages(file);
        indexData.push({ filename, title, date, pageCount, sectionMarker: 0 });
      } catch (err) {
        log.push({ stage: `FETCH ERROR: ${filename}`, elapsed: ((performance.now() - t0) / 1000).toFixed(2), used: null, total: null });
        console.error(`Memtest: failed to load ${filename}:`, err);
      }
    }

    snapshot('files-loaded');
    memEl.querySelector('p').textContent = 'Running pipeline…';

    const config = makeConfig({
      'heading.bundleTitle': `${label} — Memory Test`,
      'heading.projectName': 'Memory Test Case',
      'heading.claimNumber': 'MT-2026-001',
    });

    let outputBytes = null;
    try {
      outputBytes = await processTheBundle(filesMap, indexData, config, (stageName) => {
        currentStage = stageName.replace(/…$/, '').trim();
        snapshot(currentStage);
      });
      currentStage = 'complete';
      snapshot('complete');
      stopPolling();
      // Post-GC snapshot: allow browser GC to run, then sample again
      await new Promise(r => setTimeout(r, 2000));
      snapshot('post-GC (2s after complete)');
    } catch (err) {
      stopPolling();
      snapshot(`ERROR: ${err.message}`);
    }

    // Snapshot all worker peaks before rendering (populated during processTheBundle)
    const workerPeakSnapshot = { ...workerPeaks, ...footerWorkerPeaks, ...metaWorkerPeaks };

    // Render results
    const hasMem   = performance.memory != null;
    const baseline = log[0]?.used;

    function mb(bytes)  { return bytes != null ? (bytes / 1024 / 1024).toFixed(1) + ' MB' : 'n/a'; }
    function delta(used) {
      if (used == null || baseline == null) return 'n/a';
      const d = (used - baseline) / 1024 / 1024;
      return `${d >= 0 ? '+' : ''}${d.toFixed(1)} MB`;
    }

    const onProgressPeak = hasMem ? log.reduce((m, e) => (e.used ?? 0) > (m.used ?? 0) ? e : m, log[0]) : null;
    const final          = log[log.length - 1];

    let html = `<h2>${label} — ${new Date().toLocaleTimeString()}</h2>`;
    html += `<p>Files: ${filesMap.size} of ${pdfList.length} loaded &nbsp;|&nbsp; Output: ${outputBytes ? mb(outputBytes.byteLength) : 'n/a'}</p>`;

    if (!hasMem) {
      html += `<p class="mem-note">performance.memory not available in this browser — JS heap column shows n/a. performance.mark() labels have been set; open the Firefox Profiler and they will appear as named markers on the memory timeline.</p>`;
    } else {
      const retained = final.used != null ? delta(final.used) : 'n/a';
      if (pollPeak) {
        html += `<p class="mem-peak">Continuous poll peak: ${mb(pollPeak.used)} (during &ldquo;${pollPeak.stage}&rdquo;) &nbsp;|&nbsp; onProgress peak: ${mb(onProgressPeak?.used)} at &ldquo;${onProgressPeak?.stage}&rdquo;</p>`;
      } else {
        html += `<p class="mem-peak">onProgress peak: ${mb(onProgressPeak?.used)} at &ldquo;${onProgressPeak?.stage}&rdquo;</p>`;
      }
      // Worker heap peaks (mupdf workers: wasm heap invisible to performance.memory — expect ~0)
      const wps = workerPeakSnapshot;
      const stageUsed = s => log.find(e => e.stage === s)?.used;
      const fmtWorker = (peakMB, mainBytes) => {
        if (peakMB == null) return 'n/a';
        const combined = mainBytes != null
          ? ` (combined with main: ${(peakMB + mainBytes / 1024 / 1024).toFixed(1)} MB)` : '';
        return peakMB.toFixed(1) + ' MB' + combined;
      };
      const workerRows = [
        ['mergePdfsByTOC (mupdf)',  wps.mergePdfsByTOC,  stageUsed('Merging documents')],
        ['mergeTwoPdfs (mupdf)',    wps.mergeTwoPdfs,    stageUsed('Merging index with documents')],
        ['pageNumbering (pdf-lib)', wps.pageNumbering,   stageUsed('Adding page numbering')],
        ['meta (mupdf)',            wps.meta,            stageUsed('Adding hyperlinks')],
      ].filter(([, peak]) => peak != null);
      if (workerRows.length) {
        html += `<p class="mem-peak">Worker peaks (not in main-thread poll):<br>`
          + workerRows.map(([name, peak, main]) => `&nbsp;&nbsp;${name}: ${fmtWorker(peak, main)}`).join('<br>')
          + `</p>`;
      }
      html += `<p>Retained after post-GC snapshot: ${retained}</p>`;
    }

    html += `<table><thead><tr>
      <th>Stage</th><th>Elapsed (s)</th><th>JS heap used</th><th>Delta from start</th>
    </tr></thead><tbody>`;

    for (const e of log) {
      const isPeak = hasMem && e === onProgressPeak;
      html += `<tr${isPeak ? ' style="background:#fffbe6"' : ''}>
        <td>${e.stage}</td>
        <td>${e.elapsed}</td>
        <td>${mb(e.used)}</td>
        <td>${delta(e.used)}</td>
      </tr>`;
    }
    html += `</tbody></table>`;
    memEl.innerHTML = html;

    lastMemLog = { label, runTimestamp, log, pollPeak, pdfList, outputSize: outputBytes?.byteLength ?? null, workerPeakSnapshot };
    for (const id of ['memLight', 'memHeavy', 'memMassive', 'downloadMem'])
      document.getElementById(id).disabled = false;
  }

  document.getElementById('memLight').addEventListener('click',   () => runMemtest('Memtest Light',   LIGHT_PDFS));
  document.getElementById('memHeavy').addEventListener('click',   () => runMemtest('Memtest Heavy',   HEAVY_PDFS));
  document.getElementById('memMassive').addEventListener('click', () => runMemtest('Memtest Massive', MASSIVE_PDFS));


  // ── mupdf save options comparison (one variant per fresh tab, results in localStorage) ──

  function loadSaveOptsResults() {
    try { return JSON.parse(localStorage.getItem(SAVE_OPTS_KEY) || '{}'); } catch { return {}; }
  }


  function renderSaveOptsTable() {
    const el = document.getElementById('saveOptResults');
    const stored = loadSaveOptsResults();
    const baseline = stored['pdf'];

    const rows = SAVE_OPTS_VARIANTS.map(({ opts, label, note }) => {
      const r = stored[opts];
      if (!r) return `<tr>
        <td><code>${opts}</code></td>
        <td colspan="5" style="color:#aaa">not yet run — open a fresh tab and click "${label}"</td>
        <td>${note}</td>
      </tr>`;

      const outMb = (r.outputBytes / 1024 / 1024).toFixed(2);
      const outPct = baseline ? (r.outputBytes - baseline.outputBytes) / baseline.outputBytes * 100 : null;
      const outPctStr   = outPct == null || r.outputBytes === baseline.outputBytes ? '—'
        : `${outPct >= 0 ? '+' : ''}${outPct.toFixed(1)}%`;
      const outPctStyle = outPct != null && outPct < -5 ? 'color:#2a7a2a;font-weight:bold'
        : outPct != null && outPct > 5 ? 'color:#c00;font-weight:bold' : '';

      const hpct = (baseline?.heapPeak != null && r.heapPeak != null)
        ? (r.heapPeak - baseline.heapPeak) / baseline.heapPeak * 100 : null;
      const hpctStr   = hpct == null || r.heapPeak === baseline?.heapPeak ? '—'
        : `${hpct >= 0 ? '+' : ''}${hpct.toFixed(1)}%`;
      const hpctStyle = hpct != null && hpct < -5 ? 'color:#2a7a2a;font-weight:bold'
        : hpct != null && hpct > 5 ? 'color:#c00;font-weight:bold' : '';

      const ts = r.timestamp ? new Date(r.timestamp).toLocaleTimeString() : '';
      return `<tr>
        <td><code>${opts}</code></td>
        <td>${outMb} MB</td>
        <td style="${outPctStyle}">${outPctStr}</td>
        <td>${heapMbStr(r.heapPeak)}</td>
        <td style="${hpctStyle}">${hpctStr}</td>
        <td>${heapMbStr(r.heapAfterFree)}</td>
        <td>${r.elapsed}s</td>
        <td style="color:#aaa;font-size:0.8em">${ts}</td>
        <td>${note}</td>
      </tr>`;
    }).join('');

    const runCount = Object.keys(stored).length;
    el.innerHTML = `<h2>Save Options Results (Heavy PDFs)</h2>
      <p>Heap peak = <code>usedJSHeapSize</code> immediately after <code>saveToBuffer</code> returns
      (merged doc + save buffer both live in WASM heap). Chrome/Edge only.
      ${runCount}/${SAVE_OPTS_VARIANTS.length} variants run.</p>
      <table><thead><tr>
        <th>Option</th>
        <th>Output</th><th>vs baseline</th>
        <th title="usedJSHeapSize after saveToBuffer returns — doc + buffer both live">Heap peak</th><th>vs baseline</th>
        <th title="usedJSHeapSize after destroy() calls — WASM cleared">Heap after free</th>
        <th>Time</th><th>Recorded</th><th>Note</th>
      </tr></thead><tbody>${rows}</tbody></table>`;
  }

  // Tab-level cache so multiple runs in the same tab don't re-fetch
  let cachedHeavyBufs = null;

  async function getHeavyBufs() {
    if (cachedHeavyBufs) return cachedHeavyBufs;
    const bufs = [];
    for (const { filename, subdir = '' } of HEAVY_PDFS) {
      const url = `/testpdfs/${subdir ? subdir + '/' : ''}${encodeURIComponent(filename)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status} fetching ${filename}`);
      bufs.push(new Uint8Array(await res.arrayBuffer()));
    }
    cachedHeavyBufs = bufs;
    return bufs;
  }

  async function runSaveOpt(variantIndex) {
    const { opts, label } = SAVE_OPTS_VARIANTS[variantIndex];
    const btnId = `saveOpt_${variantIndex}`;
    const btn   = document.getElementById(btnId);
    btn.disabled = true;
    btn.textContent = `${label} — fetching…`;

    let bufs;
    try {
      bufs = await getHeavyBufs();
    } catch (err) {
      btn.textContent = `${label} — fetch error`;
      btn.disabled = false;
      return;
    }

    btn.textContent = `${label} — merging…`;
    await new Promise(r => setTimeout(r, 0));

    const t0 = performance.now();
    let bytes, heapPeak, heapAfterFree, errMsg;
    try {
      const dst = mupdf.Document.openDocument(bufs[0], 'application/pdf');
      try {
        for (let i = 1; i < bufs.length; i++) {
          const src = mupdf.Document.openDocument(bufs[i], 'application/pdf');
          const n = src.countPages();
          for (let p = 0; p < n; p++) dst.graftPage(-1, src, p);
          src.destroy();
        }
        const buf = dst.saveToBuffer(opts);
        heapPeak = performance.memory?.usedJSHeapSize ?? null;
        bytes = buf.asUint8Array().slice();
        buf.destroy();
      } finally {
        dst.destroy();
      }
      heapAfterFree = performance.memory?.usedJSHeapSize ?? null;
    } catch (err) {
      errMsg = err.message;
    }
    const elapsed = ((performance.now() - t0) / 1000).toFixed(1);

    if (errMsg) {
      btn.textContent = `${label} — ERROR`;
      btn.disabled = false;
      const stored = loadSaveOptsResults();
      stored[opts] = { error: errMsg, elapsed, timestamp: new Date().toISOString() };
      localStorage.setItem(SAVE_OPTS_KEY, JSON.stringify(stored));
    } else {
      const stored = loadSaveOptsResults();
      stored[opts] = {
        outputBytes:  bytes.byteLength,
        heapPeak:     heapPeak,
        heapAfterFree: heapAfterFree,
        elapsed,
        timestamp: new Date().toISOString(),
      };
      localStorage.setItem(SAVE_OPTS_KEY, JSON.stringify(stored));
      btn.textContent = `${label} ✓`;
      btn.disabled = false;
    }

    renderSaveOptsTable();
  }

  function initSaveOptButtons() {
    const row = document.getElementById('saveOptBtnsRow');
    row.innerHTML = '<em style="color:#555">Save Options — Heavy PDFs (run each in a fresh tab):</em> '
      + SAVE_OPTS_VARIANTS.map((v, i) => `<button id="saveOpt_${i}">${v.label}</button>`).join(' ')
      + ' <button id="saveOptsClear" style="margin-left:12px;color:#c00">Clear Results</button>';

    SAVE_OPTS_VARIANTS.forEach((_, i) => {
      document.getElementById(`saveOpt_${i}`).addEventListener('click', () => runSaveOpt(i));
    });
    document.getElementById('saveOptsClear').addEventListener('click', () => {
      localStorage.removeItem(SAVE_OPTS_KEY);
      cachedHeavyBufs = null;
      renderSaveOptsTable();
    });

    renderSaveOptsTable();
  }

  // ── graft map comparison (per-page vs per-doc, one per fresh tab, results in localStorage) ──

  function loadGraftResults() {
    try { return JSON.parse(localStorage.getItem(GRAFT_RESULTS_KEY) || '{}'); } catch { return {}; }
  }

  function renderGraftTable() {
    const el = document.getElementById('graftResults');
    const stored = loadGraftResults();
    const baseline = stored['per-page'];

    const rows = GRAFT_VARIANTS.map(({ id, label, note }) => {
      const r = stored[id];
      if (!r) return `<tr>
        <td>${label}</td>
        <td colspan="8" style="color:#aaa">not yet run — open a fresh tab and click "${label}"</td>
        <td>${note}</td>
      </tr>`;

      if (r.error) return `<tr style="background:#fff0f0">
        <td>${label}</td>
        <td colspan="8" style="color:#c00">ERROR: ${r.error}</td>
        <td>${note}</td>
      </tr>`;

      const outMb = (r.outputBytes / 1024 / 1024).toFixed(2);
      const outPct = baseline ? (r.outputBytes - baseline.outputBytes) / baseline.outputBytes * 100 : null;
      const outPctStr   = !baseline || r.outputBytes === baseline.outputBytes ? '—'
        : `${outPct >= 0 ? '+' : ''}${outPct.toFixed(1)}%`;
      const outPctStyle = outPct != null && outPct < -2 ? 'color:#2a7a2a;font-weight:bold'
        : outPct != null && outPct > 2 ? 'color:#c00;font-weight:bold' : '';

      const hpct = (baseline?.heapPeak != null && r.heapPeak != null)
        ? (r.heapPeak - baseline.heapPeak) / baseline.heapPeak * 100 : null;
      const hpctStr   = hpct == null || r.heapPeak === baseline?.heapPeak ? '—'
        : `${hpct >= 0 ? '+' : ''}${hpct.toFixed(1)}%`;
      const hpctStyle = hpct != null && hpct < -2 ? 'color:#2a7a2a;font-weight:bold'
        : hpct != null && hpct > 2 ? 'color:#c00;font-weight:bold' : '';

      const ts = r.timestamp ? new Date(r.timestamp).toLocaleTimeString() : '';
      const pagesOk = r.outputPages != null && r.expectedPages != null && r.outputPages === r.expectedPages;
      const pagesMismatch = r.outputPages != null && r.expectedPages != null && r.outputPages !== r.expectedPages;
      const pagesStr = r.outputPages != null ? `${r.outputPages}` : 'n/a';
      const expectedStr = r.expectedPages != null ? `${r.expectedPages}` : 'n/a';
      const pagesStyle = pagesMismatch ? 'color:#c00;font-weight:bold' : pagesOk ? 'color:#2a7a2a' : '';
      return `<tr>
        <td>${label}</td>
        <td>${outMb} MB</td><td style="${outPctStyle}">${outPctStr}</td>
        <td style="${pagesStyle}">${pagesStr}</td><td>${expectedStr}</td>
        <td>${heapMbStr(r.heapPeak)}</td><td style="${hpctStyle}">${hpctStr}</td>
        <td>${heapMbStr(r.heapAfterFree)}</td>
        <td>${r.elapsed}s</td>
        <td style="color:#aaa;font-size:0.8em">${ts}</td>
        <td>${note}</td>
      </tr>`;
    }).join('');

    const runCount = Object.keys(stored).length;
    el.innerHTML = `<h2>Graft Map Results (Heavy PDFs)</h2>
      <p>Compares per-page graftPage (current) vs per-doc GraftMap.
      Heap peak = <code>usedJSHeapSize</code> after <code>saveToBuffer</code> returns. Chrome/Edge only.
      ${runCount}/${GRAFT_VARIANTS.length} variants run. Save option: <code>pdf,garbage=compact</code>.</p>
      <table><thead><tr>
        <th>Variant</th>
        <th>Output</th><th>vs baseline</th>
        <th>Pages out</th><th>Expected</th>
        <th>Heap peak</th><th>vs baseline</th>
        <th>Heap after free</th>
        <th>Time</th><th>Recorded</th><th>Note</th>
      </tr></thead><tbody>${rows}</tbody></table>`;
  }

  async function runGraftTest(variantId) {
    const variant = GRAFT_VARIANTS.find(v => v.id === variantId);
    const btn = document.getElementById(`graftBtn_${variantId}`);
    btn.disabled = true;
    btn.textContent = `${variant.label} — fetching…`;

    let bufs;
    try {
      bufs = await getHeavyBufs();
    } catch (err) {
      btn.textContent = `${variant.label} — fetch error`;
      btn.disabled = false;
      return;
    }

    btn.textContent = `${variant.label} — merging…`;
    await new Promise(r => setTimeout(r, 0));

    // Compute total input size and expected page count from source bufs
    const inputBytes = bufs.reduce((s, b) => s + b.byteLength, 0);
    let expectedPages = 0;
    for (const buf of bufs) {
      const d = mupdf.Document.openDocument(buf, 'application/pdf');
      expectedPages += d.countPages();
      d.destroy();
    }

    const t0 = performance.now();
    let bytes, heapPeak, heapAfterFree, outputPages, errMsg;
    try {
      const dst = mupdf.Document.openDocument(bufs[0], 'application/pdf');
      try {
        for (let i = 1; i < bufs.length; i++) {
          const src = mupdf.Document.openDocument(bufs[i], 'application/pdf');
          const n = src.countPages();

          if (variantId === 'per-page') {
            // Current approach: temporary graft map per graftPage call
            for (let p = 0; p < n; p++) dst.graftPage(-1, src, p);

          } else if (variantId === 'per-doc') {
            // New approach: one persistent graft map per source doc,
            // deduplicating shared resources (fonts, images) across all pages of that doc
            const graftMap = dst.newGraftMap();
            for (let p = 0; p < n; p++) graftMap.graftPage(-1, src, p);
            graftMap.destroy();
          }

          src.destroy();
        }
        outputPages = dst.countPages();
        const buf = dst.saveToBuffer('pdf,garbage=compact');
        heapPeak = performance.memory?.usedJSHeapSize ?? null;
        bytes = buf.asUint8Array().slice();
        buf.destroy();
      } finally {
        dst.destroy();
      }
      heapAfterFree = performance.memory?.usedJSHeapSize ?? null;
    } catch (err) {
      errMsg = err.message;
    }
    const elapsed = ((performance.now() - t0) / 1000).toFixed(1);

    const stored = loadGraftResults();
    stored[variantId] = errMsg
      ? { error: errMsg, elapsed, timestamp: new Date().toISOString() }
      : { outputBytes: bytes.byteLength, outputPages, expectedPages, inputBytes, heapPeak, heapAfterFree, elapsed, timestamp: new Date().toISOString() };
    localStorage.setItem(GRAFT_RESULTS_KEY, JSON.stringify(stored));

    btn.textContent = errMsg ? `${variant.label} — ERROR` : `${variant.label} ✓`;
    btn.disabled = false;
    renderGraftTable();

    if (bytes) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([bytes], { type: 'application/pdf' }));
      a.download = `graft-${variantId}-output.pdf`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 10000);
    }
  }

  function initGraftButtons() {
    const row = document.getElementById('graftBtnsRow');
    row.innerHTML = '<em style="color:#555">Graft Map Test — Heavy PDFs (run each in a fresh tab):</em> '
      + GRAFT_VARIANTS.map(v => `<button id="graftBtn_${v.id}">${v.label}</button>`).join(' ')
      + ' <button id="graftClear" style="margin-left:12px;color:#c00">Clear Results</button>';

    GRAFT_VARIANTS.forEach(v => {
      document.getElementById(`graftBtn_${v.id}`).addEventListener('click', () => runGraftTest(v.id));
    });
    document.getElementById('graftClear').addEventListener('click', () => {
      localStorage.removeItem(GRAFT_RESULTS_KEY);
      cachedHeavyBufs = null;
      renderGraftTable();
    });

    renderGraftTable();
  }

  document.getElementById('downloadMem').addEventListener('click', () => {
    if (!lastMemLog) return;
    const { label, runTimestamp, log, pollPeak, pdfList, outputSize, workerPeakSnapshot: wps } = lastMemLog;
    const labelSlug = label.toLowerCase().replace(/\s+/g, '-');
    const fileTs    = runTimestamp.replace(/[:.]/g, '-').slice(0, 19);
    const hasMem    = log.some(e => e.used != null);
    const baseline  = log[0]?.used;

    function mbTxt(b)   { return b != null ? (b / 1024 / 1024).toFixed(2) : 'n/a'; }
    function deltaTxt(used) {
      if (used == null || baseline == null) return 'n/a';
      return ((used - baseline) / 1024 / 1024).toFixed(2);
    }

    const lines = [
      `BunTool Memory Test — ${label} — ${runTimestamp}`,
      `Browser: ${navigator.userAgent}`,
      `Files (${pdfList.length}): ${pdfList.map(p => p.filename).join(', ')}`,
      `Output size: ${outputSize != null ? mbTxt(outputSize) + ' MB' : 'n/a'}`,
      `JS heap tracked: ${hasMem ? 'yes (Chrome/Edge)' : 'no — use Firefox Profiler memory track'}`,
      ...(hasMem && pollPeak ? [`Continuous poll peak: ${mbTxt(pollPeak.used)} MB (during "${pollPeak.stage}")`] : []),
      ...(wps?.mergePdfsByTOC != null ? [`Worker peak (mergePdfsByTOC, mupdf):  ${wps.mergePdfsByTOC.toFixed(2)} MB`] : []),
      ...(wps?.mergeTwoPdfs   != null ? [`Worker peak (mergeTwoPdfs, mupdf):    ${wps.mergeTwoPdfs.toFixed(2)} MB`]   : []),
      ...(wps?.pageNumbering  != null ? [`Worker peak (pageNumbering, pdf-lib): ${wps.pageNumbering.toFixed(2)} MB`]  : []),
      ...(wps?.meta           != null ? [`Worker peak (meta, mupdf):            ${wps.meta.toFixed(2)} MB`]           : []),
      '',
      'Stage\tElapsed (s)\tJS Heap Used (MB)\tDelta from start (MB)',
      ...log.map(e => `${e.stage}\t${e.elapsed}\t${mbTxt(e.used)}\t${deltaTxt(e.used)}`),
    ];

    const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `memtest-buntool-${labelSlug}-${fileTs}.txt`;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 0);
  });
</script>
